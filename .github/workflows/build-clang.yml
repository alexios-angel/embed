name: build-clang-std-embed

# Full LLVM builds are expensive (~2-4 h per platform on hosted runners),
# so this only runs on demand: manually (optionally publishing a release),
# or by pushing a clang-std-embed-* tag.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Publish the toolchains to a GitHub release with this tag (created if missing). Leave empty for artifacts only."
        required: false
        default: ""
  push:
    tags: ["clang-std-embed-*"]

env:
  # Upstream llvm/llvm-project commit the std::embed patch is based on.
  LLVM_BASE: ced9fa35844724063b20d4b0d67a7960247c8067
  LLVM_PATCH: patches/0002-clang-full-std-embed-and-depend.patch

jobs:
  unix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04,     name: linux-x86_64 }
          - { os: ubuntu-24.04-arm, name: linux-aarch64 }
          - { os: macos-15,         name: macos-arm64 }
          # Intel macOS runner label; adjust if GitHub retires it.
          - { os: macos-15-intel,   name: macos-x86_64 }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Checkout LLVM at pinned base and apply std::embed patch
        run: |
          git init llvm-toolchain
          git -C llvm-toolchain remote add origin https://github.com/llvm/llvm-project.git
          git -C llvm-toolchain fetch --depth 1 origin "$LLVM_BASE"
          git -C llvm-toolchain checkout FETCH_HEAD
          git -C llvm-toolchain apply --verbose "$GITHUB_WORKSPACE/$LLVM_PATCH"

      - name: Build clang
        run: |
          # Hosted runners have limited RAM; keep links serialized.
          LLVM_SRC="$PWD/llvm-toolchain" LINK_JOBS=1 \
            ./scripts/build-clang/build.sh native

      - uses: actions/upload-artifact@v4
        with:
          name: clang-std-embed-${{ matrix.name }}
          path: dist/*.tar.xz
          if-no-files-found: error

  windows-msvc:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install ninja
        run: choco install ninja --no-progress -y

      - name: Checkout LLVM at pinned base and apply std::embed patch
        shell: pwsh
        run: |
          git init llvm-toolchain
          git -C llvm-toolchain remote add origin https://github.com/llvm/llvm-project.git
          git -C llvm-toolchain fetch --depth 1 origin "$env:LLVM_BASE"
          git -C llvm-toolchain checkout FETCH_HEAD
          git -C llvm-toolchain apply --verbose "$env:GITHUB_WORKSPACE/$env:LLVM_PATCH"

      - name: Build clang
        shell: pwsh
        run: |
          ./scripts/build-clang/build.ps1 -LlvmSrc "$PWD\llvm-toolchain" -LinkJobs 1

      - uses: actions/upload-artifact@v4
        with:
          name: clang-std-embed-windows-x86_64-msvc
          path: dist/*.zip
          if-no-files-found: error

  release:
    # Publish whatever platforms built successfully to the Releases page.
    needs: [unix, windows-msvc]
    if: >-
      !cancelled() &&
      (needs.unix.result == 'success' || needs.windows-msvc.result == 'success') &&
      (github.ref_type == 'tag' || inputs.release_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ inputs.release_tag }}"
          fi
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "std::embed clang toolchain $TAG" \
              --notes "Prebuilt clang/LLVM toolchains with the full std::embed and #depend implementation (patches/0002, based on llvm/llvm-project $LLVM_BASE). Unpack and use bin/clang++."
          fi
          gh release upload "$TAG" dist/* --clobber --repo "$GITHUB_REPOSITORY"
